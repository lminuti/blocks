name: Manual Delphi Build and Deploy

# Enable manual trigger from the GitHub Actions UI
on:
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: self-hosted

    steps:
      # 1. Download source code from the repository
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Build the test project
      - name: Build Tests
        run: |
          cd Tests
          BuildTest.bat
        shell: cmd

      # 3. Run the tests - fail the build if any test fails
      - name: Run Tests
        run: |
          $exe = "Tests\Win32\Release\Blocks.Tests.Framework.exe"
          if (-not (Test-Path $exe)) {
              Write-Error "Test executable not found: $exe"
              exit 1
          }
          & $exe --exitbehavior:Continue
          if ($LASTEXITCODE -ne 0) {
              Write-Error "Tests failed with exit code $LASTEXITCODE."
              exit $LASTEXITCODE
          }
          Write-Host "All tests passed."
        shell: powershell

      # 4. Build the project using MSBuild
      # Note: Adjust the rsvars.bat path to match your Delphi version/installation
      - name: Compile Delphi Project
        run: |
          cd setup
          BuildRelease.bat
        shell: cmd

      # 5. Ensure the binary was created successfully
      - name: Verify Compiled Binary
        run: |
          if (Test-Path "setup\Output\blocks-setup.exe") {
              Write-Host "Verification Success: blocks-setup.exe found."
          } else {
              Write-Error "Verification Failed: Executable not found in setup\Output."
              exit 1
          }
        shell: powershell

      # 6. Copy the generated installer to the deploy folder
      - name: Deploy Installer
        run: |
          $target = "C:\Corsi\DelphiDay2026"
          New-Item -ItemType Directory -Force -Path $target | Out-Null
          Copy-Item "setup\Output\blocks-setup.exe" -Destination $target -Force
          Write-Host "Deployed blocks-setup.exe to $target."
        shell: powershell
